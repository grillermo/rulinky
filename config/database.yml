default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  url: <%= ENV.fetch("DATABASE_URL", "postgresql://grillermo@192.168.1.1/rulinky") %>

development:
  <<: *default

test:
  <<: *default
  url: <%= ENV.fetch("TEST_DATABASE_URL", "postgresql://grillermo@192.168.1.1/rulinky_test") %>

production:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL") %>

